name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Restore media mirror
        uses: actions/cache@v4
        with:
          path: |
            public/media
            content/media-optimized.json
          key: media-${{ hashFiles('content/media-manifest.json') }}
          restore-keys: |
            media-

      - name: Download missing media from WordPress
        env:
          MEDIA_CONCURRENCY: 4
        run: node scripts/download-media.mjs

      - name: Optimize media
        run: node scripts/optimize-media.mjs

      - name: Compress media (jpegoptim/oxipng)
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q jpegoptim oxipng || sudo apt-get install -y -q jpegoptim
          node scripts/optimize-media-cli.mjs

      - name: Build static site
        env:
          SITE_URL: ${{ vars.SITE_URL || 'https://jthrilly.github.io' }}
          NEXT_PUBLIC_BASE_PATH: ${{ vars.BASE_PATH || '/marindakook' }}
        run: npm run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
