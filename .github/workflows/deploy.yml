name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  # write is for the rendition commit-back below (Track D/D10); everything
  # else the build job does is read-only.
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Validate content
        run: npm run validate:content

      - name: Run tests
        run: npm test

      # Run-unique key so the post-job save always happens (an exact-key cache
      # hit would skip saving, freezing the mirror at its first partial state).
      - name: Restore media mirror
        uses: actions/cache@v4
        with:
          path: |
            public/media
            content/media-optimized.json
          key: media-${{ hashFiles('content/media-manifest.json') }}-${{ github.run_id }}
          restore-keys: |
            media-${{ hashFiles('content/media-manifest.json') }}-
            media-

      # On a cold cache, seed the mirror from the release asset instead of
      # bulk-fetching ~5,000 files from the WordPress host (which rate-limits
      # sustained request streams). The downloader then only fetches deltas.
      - name: Seed media mirror from release
        if: hashFiles('public/media/**') == ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release download media-seed --pattern media-mirror.tar.gz --dir /tmp 2>/dev/null; then
            tar xzf /tmp/media-mirror.tar.gz
            rm /tmp/media-mirror.tar.gz
            echo "Seeded $(find public/media -type f | wc -l) files from release"
          else
            echo "No media-seed release found; falling back to origin download"
          fi

      - name: Download missing media from WordPress
        env:
          MEDIA_CONCURRENCY: 4
        run: node scripts/download-media.mjs

      # Track D/D10: the chat CMS Worker commits a new post's hero photo
      # directly via the GitHub API (bypassing /public/media/'s .gitignore,
      # same as legacy WordPress-sourced originals above) but only writes the
      # deterministic `-WxH` rendition PATHS into the post JSON — WordPress
      # used to generate the actual rendition files, so CI does it now.
      # Placed after the media download/seed steps (so both Worker-committed
      # and WordPress-mirrored originals are on disk) and before Optimize
      # media (so freshly materialized crops get compressed in this run too).
      #
      # TRACK C COUPLING: Track C (WordPress decommission) will move media
      # wholesale into git and is expected to rewrite this workflow (removing
      # the download/seed/cache steps above). Track C must reconcile this
      # step's placement and its commit-back below when it lands.
      - name: Materialize renditions
        run: node scripts/materialize-renditions.mjs > /tmp/materialized-renditions.txt

      - name: Commit materialized renditions
        run: |
          if [ ! -s /tmp/materialized-renditions.txt ]; then
            echo "No new renditions to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # public/media is gitignored (synced WordPress mirror); force-add
          # only the specific files this run generated, never the whole tree.
          while IFS= read -r path; do
            git add -f -- "$path"
          done < /tmp/materialized-renditions.txt
          if git diff --cached --quiet; then
            echo "Nothing to commit (a concurrent run already published these renditions)."
            exit 0
          fi
          git commit -m "chore: materialize photo renditions [skip ci]"

          push_ok=true
          if ! git push; then
            push_ok=false
            echo "Push rejected; rebasing onto origin/main and retrying once."
            if git fetch origin main && git rebase origin/main; then
              if git push; then
                push_ok=true
              else
                echo "Push still rejected after rebase; skipping commit-back for this run."
              fi
            else
              echo "Fetch/rebase failed; abandoning commit-back for this run."
              git rebase --abort 2>/dev/null || true
            fi
          fi
          # Non-fatal either way: the renditions materialized above are
          # already on disk for this run's build, so a lost race here just
          # means the next run (Worker publish or scheduled sync) re-derives
          # and commits them — never a failed deploy over a benign race.
          if $push_ok; then
            echo "Pushed rendition commit."
          else
            echo "Renditions used for this run's build but not committed back."
          fi

      - name: Optimize media
        run: node scripts/optimize-media.mjs

      - name: Compress media (jpegoptim/oxipng)
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q jpegoptim oxipng || sudo apt-get install -y -q jpegoptim
          node scripts/optimize-media-cli.mjs

      - name: Build static site
        env:
          SITE_URL: ${{ vars.SITE_URL || 'https://jthrilly.github.io' }}
          NEXT_PUBLIC_BASE_PATH: ${{ vars.BASE_PATH || '/marindakook' }}
        run: npm run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
